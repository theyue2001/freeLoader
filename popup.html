<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>薪水小偷計算器</title>
    <link rel="stylesheet" href="popup.css" />
    <script src="popup.js" defer></script>
  </head>
  <body>
    <main class="app" aria-live="polite">
      <header class="hero">
        <div class="badge">ON DUTY</div>
        <h1>薪水小偷計算器</h1>
        <p>今天也要把每一秒換成漂亮的 NT$。</p>
      </header>

      <section class="mascot-scene" aria-hidden="true">
        <video
          class="cash-cow-video"
          autoplay
          loop
          muted
          playsinline
          preload="auto"
        >
          <source src="assets/cash-cow-run-transparent.webm" type="video/webm" />
        </video>
      </section>

      <section class="panel salary-panel" aria-labelledby="salaryLabel">
        <label class="field">
          <span id="salaryLabel">月薪</span>
          <div class="money-input">
            <span>NT$</span>
            <input
              id="salary"
              type="number"
              min="0"
              step="1000"
              inputmode="decimal"
              placeholder="60000"
              autocomplete="off"
            />
          </div>
        </label>
      </section>

      <section class="panel earned-panel">
        <div class="metric-header">
          <span>今天已賺</span>
          <span id="clock">--:--:--</span>
        </div>
        <strong id="earnedToday" class="earned">NT$0</strong>
        <div class="month-earned">
          <span>本月累積已賺</span>
          <strong id="earnedThisMonth">NT$0</strong>
        </div>
        <p id="quip" class="quip">輸入月薪後，偷薪儀表板就會開始轉動。</p>

        <div class="progress-row">
          <span>今日工作進度</span>
          <strong id="progressText">0%</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </section>

      <section class="rates" aria-label="薪資換算">
        <article>
          <span>每小時薪資</span>
          <strong id="hourlyWage">NT$0</strong>
        </article>
        <article>
          <span>每分鐘薪資</span>
          <strong id="minuteWage">NT$0</strong>
        </article>
      </section>

      <details class="panel settings">
        <summary>計算設定</summary>
        <div class="settings-grid">
          <label class="field compact">
            <span>每月工作天數</span>
            <input id="workDays" type="number" min="1" max="31" step="1" />
          </label>
          <label class="field compact">
            <span>每天工作時數</span>
            <input id="workHours" type="number" min="0.5" max="24" step="0.5" />
          </label>
          <label class="field compact">
            <span>上班時間</span>
            <input id="startTime" type="time" />
          </label>
          <label class="field compact">
            <span>下班時間</span>
            <input id="endTime" type="time" />
          </label>
        </div>
      </details>

      <footer id="status" class="status">尚未輸入月薪，今天先當精神股東。</footer>
    </main>
  </body>
</html>
